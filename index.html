<!DOCTYPE html>

    <title>Vow Moments — Cinematic Storytelling</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body>
    <div id="root"></div>
    
    <!-- Firebase Configuration -->
    <script type="module">
      // Import the functions you need from the SDKs you need
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, connectFirestoreEmulator } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
      
      // Your web app's Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyCWtbuImj4WmDIEmweCYDy3vGkpRwkfc8s",
        authDomain: "vowmoments-45660.firebaseapp.com",
        projectId: "vowmoments-45660",
        storageBucket: "vowmoments-45660.firebasestorage.app",
        messagingSenderId: "88406923540",
        appId: "1:88406923540:web:bf90e1b07774d674318a01"
      };
      
      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      
      // Make Firebase available globally
      window.firebaseApp = app;
      window.firebaseDb = db;
      window.firebaseInitialized = true;
      
      // Import Firestore functions and make them available globally
      import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js").then((firestoreModule) => {
        window.firestoreModule = firestoreModule;
        console.log("Firebase initialized successfully");
        
        // Dispatch a custom event to notify that Firebase is ready
        window.dispatchEvent(new CustomEvent('firebaseReady'));
      }).catch((error) => {
        console.error("Error loading Firestore module:", error);
      });
    </script>
    
    <script type="module" src="/src/main.jsx"></script>
